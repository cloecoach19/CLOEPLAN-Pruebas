<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1600" />
<title>CLOE te organiza — Prototipo</title>
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { margin: 0; padding: 0; background: #E8E0CF; font-family: 'Bricolage Grotesque', system-ui, sans-serif; }
  #root { width: 100%; height: 100vh; }
  /* Make DesignCanvas backdrop match warm tone */
  body { background: #E8E0CF; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="mobile-screens.jsx"></script>
<script type="text/babel" src="desktop.jsx"></script>

<script type="text/babel">
// ─── Tweak defaults ─────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "calida",
  "density": "comoda",
  "dark": false,
  "type": "moderna"
}/*EDITMODE-END*/;

const PALETTES = [
  { id: 'calida',  name: 'Cálida',  swatch: ['#C24A22','#F2EBDD','#261C16'] },
  { id: 'verde',   name: 'Verde',   swatch: ['#3D7240','#ECEEDF','#1E2818'] },
  { id: 'lavanda', name: 'Lavanda', swatch: ['#6C4AB3','#ECE6EE','#221C2A'] },
  { id: 'carbon',  name: 'Carbón',  swatch: ['#E89E4C','#25231F','#F2EAD9'] },
];

// ─── App root ───────────────────────────────────────────
function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const state = useAppState();

  // Apply tweak data-attrs to body
  React.useEffect(() => {
    document.body.dataset.palette = t.palette;
    document.body.dataset.density = t.density;
    document.body.dataset.type    = t.type;
    document.body.dataset.theme   = t.dark ? 'dark' : 'light';
  }, [t.palette, t.density, t.type, t.dark]);

  return (
    <>
      <DesignCanvas backdrop="#E8E0CF" initialFit="x">
        {/* ─── Mobile ─── */}
        <DCSection id="mobile" title="Móvil" subtitle="iPhone · 5 pantallas · todo en castellano, con humor">
          <DCArtboard id="hoy" label="Hoy · resumen del día" width={440} height={912}>
            <MobileScreenWrap state={state} initialTab="hoy" />
          </DCArtboard>
          <DCArtboard id="compra" label="Compra · por categorías" width={440} height={912}>
            <MobileScreenWrap state={state} initialTab="compra" />
          </DCArtboard>
          <DCArtboard id="tareas" label="Tareas · ranking semanal" width={440} height={912}>
            <MobileScreenWrap state={state} initialTab="tareas" />
          </DCArtboard>
          <DCArtboard id="calendario" label="Calendario · agenda compartida" width={440} height={912}>
            <MobileScreenWrap state={state} initialTab="calendario" />
          </DCArtboard>
          <DCArtboard id="loki" label="Loki · mascota" width={440} height={912}>
            <MobileScreenWrap state={state} initialTab="loki" />
          </DCArtboard>
        </DCSection>

        {/* ─── Desktop ─── */}
        <DCSection id="desktop" title="Escritorio" subtitle="Dashboard familiar — sidebar + grid">
          <DCArtboard id="dashboard" label="Dashboard · 1440 × 900" width={1440} height={900}>
            <DesktopApp state={state} />
          </DCArtboard>
        </DCSection>

        {/* ─── Sistema (palette) ─── */}
        <DCSection id="sistema" title="Sistema" subtitle="Paletas, miembros, categorías">
          <DCArtboard id="palette" label="Paleta + miembros + categorías" width={1200} height={620}>
            <SistemaCard />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      {/* ─── Tweaks panel ─── */}
      <TweaksPanel title="Tweaks">
        <TweakSection label="Paleta">
          <TweakRow label="Tema">
            <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
              {PALETTES.map(p => (
                <PaletteSwatch key={p.id} palette={p}
                  active={t.palette === p.id}
                  onClick={() => setTweak('palette', p.id)} />
              ))}
            </div>
          </TweakRow>
        </TweakSection>
        <TweakSection label="Tipografía">
          <TweakRadio
            label="Estilo"
            value={t.type}
            options={[
              { value: 'moderna',    label: 'Moderna'   },
              { value: 'geometrica', label: 'Geo'  },
              { value: 'funnel',     label: 'Funnel'    },
            ]}
            onChange={v => setTweak('type', v)}
          />
        </TweakSection>
        <TweakSection label="Densidad">
          <TweakRadio
            label="Densidad"
            value={t.density}
            options={[{ value: 'comoda', label: 'Cómoda' }, { value: 'compacta', label: 'Compacta' }]}
            onChange={v => setTweak('density', v)}
          />
        </TweakSection>
        <TweakSection label="Apariencia">
          <TweakToggle label="Modo oscuro" value={t.dark} onChange={v => setTweak('dark', v)} />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

// ─── TweakColor wrapper — accept option objects ──────────
// (TweakColor from starter accepts strings or arrays — we want labeled buttons)
function PaletteSwatch({ palette, active, onClick }) {
  return (
    <button onClick={onClick} title={palette.name}
      style={{
        position: 'relative', width: 56, height: 36, borderRadius: 10,
        border: active ? '2px solid var(--ink, #261C16)' : '1.5px solid rgba(0,0,0,0.15)',
        cursor: 'pointer', overflow: 'hidden', padding: 0,
      }}>
      <div style={{ position: 'absolute', inset: 0, display: 'flex' }}>
        {palette.swatch.map((c, i) => (
          <div key={i} style={{ flex: 1, background: c }} />
        ))}
      </div>
    </button>
  );
}

// ─── Mobile wrapper — iOS device frame around screens ───
function MobileScreenWrap({ state, initialTab }) {
  return (
    <div style={{ width: '100%', height: '100%', display: 'flex', alignItems: 'flex-start',
                  justifyContent: 'center', padding: '12px 0' }}>
      <IOSDevice width={402} height={874} dark={false}>
        <MobileApp state={state} initialTab={initialTab} />
      </IOSDevice>
    </div>
  );
}

// ─── Sistema card — palette + members ──────────────────
function SistemaCard() {
  return (
    <div className="cloe" style={{ width: '100%', height: '100%', background: 'var(--bg)', padding: 36, overflow: 'hidden' }}>
      <div style={{ display: 'grid', gridTemplateColumns: '1.2fr 1fr', gap: 28, height: '100%' }}>

        {/* Members */}
        <div>
          <div className="eyebrow" style={{ marginBottom: 6 }}>FAMILIA</div>
          <h2 className="display" style={{ fontSize: 36, fontWeight: 700, margin: '0 0 24px', letterSpacing: 'var(--tracking-display)' }}>
            Los avatares
          </h2>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 14 }}>
            {MEMBERS.map(m => (
              <div key={m.id} className="card" style={{ padding: 18, textAlign: 'center', background: 'var(--surface)' }}>
                <Avatar id={m.id} size="lg" />
                <div className="display" style={{ fontSize: 18, fontWeight: 700, marginTop: 12 }}>{m.name}</div>
                <div className="meta" style={{ fontSize: 12 }}>{m.role}</div>
              </div>
            ))}
          </div>

          <div className="eyebrow" style={{ margin: '28px 0 6px' }}>CATEGORÍAS</div>
          <h2 className="display" style={{ fontSize: 28, fontWeight: 700, margin: '0 0 16px' }}>
            Cada cosa en su sitio
          </h2>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
            {[
              ['🛒','Compra'], ['🧽','Limpieza'], ['🍳','Cocina'], ['🐕','Mascota'],
              ['🧸','Niños'], ['🌿','Plantas'], ['🚗','Recados'], ['💊','Salud'],
              ['🎉','Social'], ['🎒','Cole'],
            ].map(([e,l]) => (
              <span key={l} className="chip" style={{ height: 32, fontSize: 13, padding: '0 12px' }}>
                {e} {l}
              </span>
            ))}
          </div>
        </div>

        {/* Type & color */}
        <div>
          <div className="eyebrow" style={{ marginBottom: 6 }}>TIPOGRAFÍA</div>
          <h2 className="display" style={{ fontSize: 36, fontWeight: 700, margin: '0 0 8px' }}>
            Bricolage<br/>Grotesque.
          </h2>
          <div style={{ fontSize: 13, color: 'var(--ink-2)', marginBottom: 24 }}>
            Moderna · geométrica · variable — para titulares y UI. Pesos del 300 al 800.
          </div>

          <div className="eyebrow" style={{ marginBottom: 6 }}>PALETA</div>
          <div className="card" style={{ padding: 16, background: 'var(--surface)' }}>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 8 }}>
              {[
                ['Bg', 'var(--bg)'],
                ['Surface', 'var(--surface)'],
                ['Surface 2', 'var(--surface-2)'],
                ['Ink', 'var(--ink)'],
                ['Ink 2', 'var(--ink-2)'],
                ['Line', 'var(--line)'],
                ['Accent', 'var(--accent)'],
                ['Accent 2', 'var(--accent-2)'],
                ['Soft', 'var(--accent-soft)'],
              ].map(([n, v]) => (
                <div key={n}>
                  <div style={{ height: 44, background: v, borderRadius: 8, border: '1px solid var(--line)' }} />
                  <div style={{ fontSize: 11, marginTop: 4, color: 'var(--ink-2)' }}>{n}</div>
                </div>
              ))}
            </div>
          </div>

          <div style={{ marginTop: 24, padding: '16px 18px', background: 'var(--ink)', color: 'var(--bg)', borderRadius: 14 }}>
            <div className="display" style={{ fontSize: 17, fontWeight: 600 }}>
              "Quien limpia el baño manda en casa."
            </div>
            <div style={{ fontSize: 12, opacity: 0.65, marginTop: 4 }}>
              — Microcopias con humor, en castellano
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
