<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CLOE te organiza</title>
  <link rel="icon" type="image/png" href="Cloe.png">
  <link rel="apple-touch-icon" href="Cloe.png">
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#C24A22">
</head>
<body>

<main class="auth-gate">
  <div class="auth-card">
    <img src="Cloe.png" alt="CLOE" class="auth-logo">
    <h2 class="display">CLOE al rescate</h2>
    <p>Entra y evita que la casa active el modo caos.</p>

    <label>
      <input type="email" id="email" placeholder="tu-email-del-equipo@casa.es" autocomplete="username" autofocus>
    </label>
    <label>
      <input type="password" id="password" placeholder="Contraseña secreta de la guarida" autocomplete="current-password">
    </label>
    <p class="auth-err hidden" id="err">Email o contraseña incorrectos.</p>
    <button class="btn accent lg" id="submit" style="width:100%;justify-content:center;">Entrar al cuartel</button>

    <p style="margin-top:24px; font-size:12px; color:var(--ink-3);">
      ¿Primera vez? Pide al admin tu pase VIP familiar.
    </p>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script src="shared.js"></script>
<script>
  if (getUser()) window.location.href = 'app.html';

  const $email = document.getElementById('email');
  const $pass  = document.getElementById('password');
  const $err   = document.getElementById('err');
  const $btn   = document.getElementById('submit');

  async function tryLogin() {
    const email = $email.value.trim().toLowerCase();
    const pass  = $pass.value;
    if (!email || !pass) return;
    $btn.disabled = true; $btn.textContent = 'Abriendo portal…';
    $err.classList.add('hidden');

    const { data, error } = await db.from('users').select('*')
      .eq('email', email).eq('password', pass).eq('status', 'active').maybeSingle();

    $btn.disabled = false; $btn.textContent = 'Entrar al cuartel';

    if (error || !data) {
      $err.textContent = error ? 'Error de conexión: ' + error.message : 'Email o contraseña incorrectos.';
      $err.classList.remove('hidden');
      $pass.value = ''; $pass.focus();
      return;
    }

    setUser(data);
    db.from('users').update({ last_seen: new Date().toISOString() }).eq('id', data.id).then(() => {});
    window.location.href = data.role === 'Admin' ? 'app.html' : 'app.html';
  }

  $btn.addEventListener('click', tryLogin);
  $email.addEventListener('keydown', e => { if (e.key === 'Enter') $pass.focus(); });
  $pass.addEventListener('keydown',  e => { if (e.key === 'Enter') tryLogin(); });
</script>
</body>
</html>
